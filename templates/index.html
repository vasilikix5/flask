<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .card {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center;
        }
        .progress-container {
            background: #eee; border-radius: 10px; height: 12px; margin: 15px 0; overflow: hidden;
        }
        .progress-bar {
            background: #2ecc71; height: 100%; width: {{ progress }}%; transition: 0.5s;
        }
        .badge-container {
            margin: 20px 0; display: flex; flex-direction: column; gap: 5px;
        }
        .badge {
            background: #e8f5e9; color: #2e7d32; padding: 5px; border-radius: 5px; font-size: 12px; font-weight: bold;
        }
        .btn-group { display: flex; justify-content: space-around; margin-top: 20px; }
        .btn {
            text-decoration: none; color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; transition: 0.3s;
        }
        .btn-like { background: #3498db; }
        .btn-coffee { background: #e67e22; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚀 My Project Status</h2>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <p style="font-size: 13px; color: #666;">Στόχος Likes: {{ likes }}/{{ goal }}</p>

        <div class="badge-container">
            {% for b in badges %}
                <div class="badge">{{ b }}</div>
            {% endfor %}
        </div>

        <div class="btn-group">
            <div>
                <div style="font-size: 24px;">{{ likes }}</div>
                <a href="/action/likes" class="btn btn-like">Like 👍</a>
            </div>
            <div>
                <div style="font-size: 24px;">{{ coffee }}</div>
                <a href="/action/coffee_cups" class="btn btn-coffee">Coffee ☕</a>
            </div>
        </div>

        <hr style="margin-top: 30px; border: 0; border-top: 1px solid #eee;">
        <p>Σύνολο Αλληλεπιδράσεων: <strong>{{ likes + coffee }}</strong></p>
        
        {% if (likes + coffee) == 0 %}
            <p style="color: #e74c3c; font-size: 12px;">Κάνε το πρώτο κλικ!</p>
        {% endif %}

        <a href="/reset" style="font-size: 11px; color: #999; text-decoration: none;">Επαναφορά</a>
    </div>

</body>
</html>
